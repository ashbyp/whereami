<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>whereami</title>
    <link rel="stylesheet" href="/assets/styles.css?v=10" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="logo" aria-label="Where am I">
          <span class="logo-mark">W</span>
          <span class="logo-text">Where am I</span>
        </div>
        <div class="topbar-actions">
          <div class="score-pill">
            <span id="round-counter">0/5</span>
            <span class="score-separator"></span>
            <span id="score-counter">0</span>
          </div>
          <button id="start-game" class="primary-button">New game</button>
          <button id="submit-guess" class="secondary-button" disabled>
            Guess
          </button>
        </div>
      </header>

      <p id="status-message" class="status-message"></p>

      <section class="game-layout">
        <div class="card panorama-card">
          <div id="street-view-frame" class="street-view-frame empty-state">
            <div id="street-view-canvas" class="street-view-canvas"></div>
            <div id="street-view-empty" class="street-view-empty">
              Ready when you are.
            </div>
            <div id="map-overlay" class="map-overlay">
              <div class="map-overlay-header">
                <span class="map-overlay-label">Map</span>
                <button
                  id="toggle-map-size"
                  class="map-toggle-button"
                  type="button"
                  aria-expanded="false"
                >
                  Open
                </button>
              </div>
              <div id="map" class="guess-map"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="result-panel" class="card result-panel hidden">
        <p id="result-summary"></p>
        <button id="next-round" class="primary-button">Next round</button>
      </section>
    </main>

    <script src="/assets/app.js?v=10" type="module"></script>
  </body>
</html>
