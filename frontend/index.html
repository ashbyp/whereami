<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>whereami</title>
    <link rel="stylesheet" href="/assets/styles.css?v=23" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="logo" aria-label="Where am I">
          <span class="logo-mark">
            <span class="logo-pin"></span>
            <span class="logo-dot"></span>
          </span>
          <span class="logo-text">Where am I?</span>
        </div>
        <div class="topbar-actions">
          <div id="difficulty-picker" class="difficulty-picker" aria-label="Difficulty">
            <button class="difficulty-chip active" data-difficulty="easy" type="button">
              Easy
            </button>
            <button class="difficulty-chip" data-difficulty="medium" type="button">
              Medium
            </button>
            <button class="difficulty-chip" data-difficulty="hard" type="button">
              Hard
            </button>
            <button class="difficulty-chip" data-difficulty="impossible" type="button">
              Impossible
            </button>
          </div>
          <div class="score-pill">
            <span id="round-counter">0/5</span>
            <span class="score-separator"></span>
            <span id="score-counter">0</span>
            <span class="score-separator"></span>
            <span id="timer-counter">00:00</span>
          </div>
          <button id="back-to-start" class="secondary-button" disabled>
            Back to start
          </button>
          <button id="start-game" class="primary-button">New game</button>
          <div id="session-summary" class="session-summary hidden">
            <button id="avatar-button" class="avatar-button" type="button">
              <div class="avatar-shell">
              <img id="avatar-image" class="avatar-image hidden" alt="Avatar" />
              <span id="avatar-fallback" class="avatar-fallback">?</span>
              </div>
            </button>
            <div class="session-copy">
              <span id="session-name" class="session-name"></span>
              <span id="session-kind" class="session-kind"></span>
            </div>
            <button id="logout-button" class="secondary-button compact-button">
              Log out
            </button>
          </div>
        </div>
      </header>
      <input id="profile-avatar-input" class="hidden-file-input" type="file" accept="image/*" />

      <p id="status-message" class="status-message"></p>
      <section id="auth-card" class="auth-card hidden">
        <div class="auth-column">
          <h2 class="auth-title">Sign in or play as guest</h2>
          <label class="field">
            <span>Email</span>
            <input id="auth-email" type="email" placeholder="you@example.com" />
          </label>
          <label class="field">
            <span>Password</span>
            <input id="auth-password" type="password" placeholder="At least 8 characters" />
          </label>
          <label class="field">
            <span>Avatar image (optional)</span>
            <input id="auth-avatar" type="file" accept="image/*" />
          </label>
          <div class="auth-actions">
            <button id="register-button" class="primary-button">Register</button>
            <button id="login-button" class="secondary-button">Log in</button>
          </div>
        </div>
        <div class="auth-divider"></div>
        <div class="auth-column guest-column">
          <h2 class="auth-title">Guest mode</h2>
          <label class="field">
            <span>Display name (optional)</span>
            <input id="guest-name" type="text" placeholder="Guest explorer" />
          </label>
          <button id="guest-button" class="primary-button">Continue as guest</button>
        </div>
      </section>

      <section class="game-layout">
        <div class="card panorama-card">
          <div id="street-view-frame" class="street-view-frame empty-state">
            <div id="street-view-canvas" class="street-view-canvas"></div>
            <div id="street-view-empty" class="street-view-empty">
              Ready when you are.
            </div>
            <div id="map-overlay" class="map-overlay">
              <div class="map-overlay-header">
                <span class="map-overlay-label">Map</span>
                <div class="map-overlay-actions">
                  <button id="submit-guess" class="secondary-button map-action" disabled>
                    Guess
                  </button>
                  <button
                    id="next-round-inline"
                    class="primary-button map-action hidden"
                    type="button"
                  >
                    Next round
                  </button>
                  <button
                    id="toggle-map-size"
                    class="map-toggle-button"
                    type="button"
                    aria-expanded="false"
                  >
                    Open
                  </button>
                </div>
              </div>
              <div id="map" class="guess-map"></div>
              <div id="map-result" class="map-result hidden">
                <p id="result-summary"></p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div id="results-modal" class="results-modal hidden">
        <div class="results-dialog">
          <h2 class="results-title">Game complete</h2>
          <p id="results-modal-summary" class="results-copy"></p>
          <div class="results-table-wrap">
            <table class="results-table">
              <thead>
                <tr>
                  <th scope="col">Round</th>
                  <th scope="col">Location</th>
                  <th scope="col">Distance</th>
                </tr>
              </thead>
              <tbody id="results-modal-body"></tbody>
            </table>
          </div>
          <button id="close-results-modal" class="primary-button" type="button">
            Close
          </button>
        </div>
      </div>
    </main>

    <script src="/assets/app.js?v=28" type="module"></script>
  </body>
</html>
